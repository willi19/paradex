<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #14161a; color: #e6e6e6; padding: 18px; }
    h1 { font-size: 1.25em; margin-bottom: 14px; color: #7cc4ff; }
    .container { max-width: 1500px; margin: 0 auto; }

    /* summary bar */
    .summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    .stat { background: #1e2127; border: 1px solid #2b2f37; border-radius: 8px; padding: 10px 16px; min-width: 110px; }
    .stat .n { font-size: 1.6em; font-weight: 700; }
    .stat .l { font-size: 0.78em; color: #9aa4b2; text-transform: uppercase; letter-spacing: .4px; }
    .stat.err .n { color: #ff5c5c; }
    .stat.stall .n { color: #ffa640; }
    .stat.ok .n { color: #46d17a; }
    .btn { cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 600; font-size: .85em; }
    .btn-restart { background: #3a2f1a; color: #ffcf70; border: 1px solid #5a4620; }
    .btn-restart:hover { background: #4a3c22; }
    .btn-all { background: #402024; color: #ff9aa0; border: 1px solid #6a2f35; margin-left: auto; align-self: center; }
    .btn-all:hover { background: #55282e; }
    .btn-stop { background: #3a1a1a; color: #ff8888; border: 1px solid #5a2020; margin-left: 6px; }
    .btn-stop:hover { background: #4a2222; }
    .btn-stopall { background: #2a2a2a; color: #cccccc; border: 1px solid #444; margin-left: 8px; align-self: center; }
    .btn-stopall:hover { background: #383838; }

    .pc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
    .pc-card { background: #1e2127; border: 1px solid #2b2f37; border-radius: 10px; padding: 16px; }
    .pc-card.down { border-color: #6a2f35; }
    .pc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #2b2f37; }
    .pc-name { font-size: 1.15em; font-weight: 700; }
    .badge { padding: 3px 11px; border-radius: 999px; font-size: 0.76em; font-weight: 700; }
    .b-run { background: #133a22; color: #46d17a; }
    .b-down { background: #3a1418; color: #ff5c5c; }
    .pc-header .btn-restart { margin-left: auto; }
    .controller { font-size: 0.8em; color: #9aa4b2; margin-bottom: 10px; word-break: break-all; }
    .controller b { color: #7cc4ff; }

    .cam { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 6px; background: #23272f; margin-bottom: 7px; border-left: 3px solid #3a3f49; }
    .cam.s-CAPTURING { border-left-color: #46d17a; }
    .cam.s-READY { border-left-color: #4a90e2; }
    .cam.s-STARTING { border-left-color: #e2c14a; }
    .cam.s-ERROR { border-left-color: #ff5c5c; background: #2c1f22; }
    .cam.s-STALLED { border-left-color: #ffa640; background: #2c261c; }
    .cam-name { font-weight: 700; color: #cdd6e2; min-width: 92px; font-variant-numeric: tabular-nums; }
    .cam-meta { font-size: 0.78em; color: #8b96a5; }
    .cam-state { margin-left: auto; font-size: 0.78em; font-weight: 700; padding: 3px 9px; border-radius: 5px; white-space: nowrap; }
    .st-CAPTURING { background: #133a22; color: #46d17a; }
    .st-READY { background: #16283f; color: #7cb8ff; }
    .st-STARTING { background: #3a341a; color: #e2c14a; }
    .st-CONNECTING, .st-STOPPED { background: #2b2f37; color: #9aa4b2; }
    .st-ERROR { background: #3a1418; color: #ff7a7a; }
    .st-STALLED { background: #3a2a15; color: #ffb866; }
    .cam-err { grid-column: 1/-1; font-size: 0.78em; color: #ff8a8a; margin-top: 4px; font-family: monospace; word-break: break-word; }
    .cam-row { display: flex; flex-direction: column; flex: 1; }
    .cam-line { display: flex; align-items: center; gap: 10px; }
    .no-cam { color: #6b7280; padding: 10px; text-align: center; font-size: 0.85em; }
    .foot { text-align: center; color: #6b7280; margin-top: 16px; font-size: 0.82em; }
    .pulse { animation: p 1.4s infinite; } @keyframes p { 0%,100%{opacity:1} 50%{opacity:.55} }

    /* error banner (top, loud) */
    .banner { display: none; background: #2c1418; border: 1px solid #7a2731; border-left: 5px solid #ff5c5c;
              border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; }
    .banner-title { color: #ff7a7a; font-weight: 700; font-size: 1.0em; margin-bottom: 6px; }
    .banner-item { color: #ffb0b0; font-size: 0.85em; font-family: monospace; word-break: break-word; padding: 2px 0; }
    .banner-item b { color: #ff8a8a; }

    /* lock / controller (who holds the PC) */
    .stat.lock .n { color: #c58bff; }
    .lockrow { margin-bottom: 10px; }
    .lock { font-size: 0.82em; font-weight: 700; padding: 4px 11px; border-radius: 999px; }
    .lock.held { background: #2a1c3d; color: #c58bff; border: 1px solid #4a2f6e; }
    .lock.free { background: #1c2027; color: #6b7280; border: 1px solid #2b2f37; }
    .count { font-size: 0.78em; font-weight: 700; padding: 3px 9px; border-radius: 5px; background: #1c2530; color: #7cb8ff; }
    .count.bad { background: #3a1418; color: #ff7a7a; }
    .pc-header .count { margin-left: 4px; }
    .cam-sinks { font-size: 0.72em; color: #46d17a; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Camera Monitor</h1>
    <div class="summary" id="summary"></div>
    <div class="banner" id="banner"></div>
    <div class="pc-grid" id="grid"></div>
    <div class="foot" id="foot">Loading…</div>
  </div>

  <script>
    const STALL_TICKS = 3;             // updates with no new frame while CAPTURING => stalled
    const frameHist = {};              // camKey -> {fid, same}

    async function restart(pc, btn) {
      if (!confirm(`Restart camera server on ${pc}?`)) return;
      btn.disabled = true; btn.textContent = '…restarting';
      try {
        const r = await fetch(`/api/restart/${pc}`, { method: 'POST' });
        const j = await r.json();
        btn.textContent = j.ok ? '✓ restarted' : '✗ failed';
      } catch (e) { btn.textContent = '✗ error'; }
      setTimeout(() => { btn.disabled = false; btn.textContent = '↻ restart'; }, 2500);
    }
    async function restartAll(btn) {
      if (!confirm('Restart ALL camera servers?')) return;
      btn.disabled = true; btn.textContent = '…restarting all';
      try { await fetch('/api/restart_all', { method: 'POST' }); } catch (e) {}
      setTimeout(() => { btn.disabled = false; btn.textContent = '↻ restart all'; }, 3000);
    }
    async function stop(pc, btn) {
      if (!confirm(`Stop camera server on ${pc}? (no relaunch)`)) return;
      btn.disabled = true; btn.textContent = '…stopping';
      try {
        const r = await fetch(`/api/stop/${pc}`, { method: 'POST' });
        const j = await r.json();
        btn.textContent = j.ok ? '✓ stopped' : '✗ failed';
      } catch (e) { btn.textContent = '✗ error'; }
      setTimeout(() => { btn.disabled = false; btn.textContent = '■ stop'; }, 2500);
    }
    async function stopAll(btn) {
      if (!confirm('Stop ALL camera servers? (no relaunch)')) return;
      btn.disabled = true; btn.textContent = '…stopping all';
      try { await fetch('/api/stop_all', { method: 'POST' }); } catch (e) {}
      setTimeout(() => { btn.disabled = false; btn.textContent = '■ stop all'; }, 3000);
    }

    function effState(pc, cam) {
      // client-side stall detection: frame frozen while CAPTURING
      const key = pc + '/' + cam.name;
      if (cam.state === 'CAPTURING') {
        const h = frameHist[key];
        if (h && h.fid === cam.frame_id) {
          h.same++;
          if (h.same >= STALL_TICKS) return 'STALLED';
        } else {
          frameHist[key] = { fid: cam.frame_id, same: 0 };
        }
      } else {
        delete frameHist[key];
      }
      return cam.state;
    }

    async function update() {
      let data;
      try { data = await (await fetch('/api/status')).json(); }
      catch (e) { document.getElementById('foot').textContent = 'connection lost'; return; }

      let running = 0, camTotal = 0, errN = 0, stallN = 0, lockedN = 0;
      const problems = [];               // {pc, cam, msg} for the top banner
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      Object.keys(data.pc_states).forEach(pc => {
        const up = data.pc_states[pc] === 2;
        if (up) running++;
        const cams = data.camera_states[pc] || [];
        const controller = data.controller_states[pc] || 'None';
        const summary = (data.camera_summary || {})[pc] || {};
        const held = controller && controller !== 'None';
        if (held) lockedN++;

        if (!up) problems.push({ pc, cam: '—', msg: 'daemon DOWN (not responding to ping)' });

        let rows = '';
        if (!cams.length) {
          rows = '<div class="no-cam">no cameras</div>';
        } else {
          cams.forEach(cam => {
            camTotal++;
            const st = effState(pc, cam);
            if (st === 'ERROR') { errN++; problems.push({ pc, cam: cam.name, msg: cam.error || 'ERROR' }); }
            if (st === 'STALLED') { stallN++; problems.push({ pc, cam: cam.name, msg: 'no new frames (stalled)' }); }
            const pulse = st === 'CAPTURING' ? ' pulse' : '';
            const sk = cam.sinks || {};
            const sinks = [sk.video ? '▶rec' : '', sk.stream ? '◉shm' : ''].filter(Boolean).join(' ');
            const errLine = (st === 'ERROR' && cam.error)
              ? `<div class="cam-err">${(cam.error + '').slice(0, 240)}</div>` : '';
            rows += `
              <div class="cam s-${st}">
                <div class="cam-row">
                  <div class="cam-line">
                    <span class="cam-name">${cam.name}</span>
                    <span class="cam-meta">#${cam.frame_id} · ${cam.mode || '-'} · ${cam.fps || '-'}fps</span>
                    ${sinks ? `<span class="cam-sinks">${sinks}</span>` : ''}
                    <span class="cam-state st-${st}${pulse}">${st}</span>
                  </div>
                  ${errLine}
                </div>
              </div>`;
          });
        }

        // detected vs expected camera count (from the daemon summary)
        const exp = summary.expected_camera_count, det = summary.detected_camera_count;
        const countBad = (exp != null && det != null && det < exp);
        if (countBad) problems.push({ pc, cam: '—', msg: `only ${det}/${exp} cameras detected` });
        const countStr = (exp != null) ? `${det != null ? det : cams.length}/${exp} cams` : `${cams.length} cams`;

        const lockBadge = held
          ? `<span class="lock held" title="holds the lock">🔒 ${controller}</span>`
          : `<span class="lock free">🔓 free</span>`;

        const card = document.createElement('div');
        card.className = 'pc-card' + (up ? '' : ' down');
        card.innerHTML = `
          <div class="pc-header">
            <span class="pc-name">${pc}</span>
            <span class="badge ${up ? 'b-run' : 'b-down'}">${up ? 'UP' : 'DOWN'}</span>
            <span class="count ${countBad ? 'bad' : ''}">${countStr}</span>
            <button class="btn btn-restart" onclick="restart('${pc}', this)">↻ restart</button>
            <button class="btn btn-stop" onclick="stop('${pc}', this)">■ stop</button>
          </div>
          <div class="lockrow">${lockBadge}</div>
          ${rows}`;
        grid.appendChild(card);
      });

      // top banner: surface every problem loudly
      const banner = document.getElementById('banner');
      if (problems.length) {
        banner.style.display = 'block';
        banner.innerHTML = `<div class="banner-title">⚠ ${problems.length} problem(s)</div>` +
          problems.slice(0, 16).map(p =>
            `<div class="banner-item"><b>${p.pc}</b> · ${p.cam}: ${(p.msg + '').slice(0, 180)}</div>`).join('');
      } else {
        banner.style.display = 'none';
        banner.innerHTML = '';
      }

      const pcN = Object.keys(data.pc_states).length;
      document.getElementById('summary').innerHTML = `
        <div class="stat ok"><div class="n">${running}/${pcN}</div><div class="l">PCs up</div></div>
        <div class="stat"><div class="n">${camTotal}</div><div class="l">cameras</div></div>
        <div class="stat err"><div class="n">${errN}</div><div class="l">errors</div></div>
        <div class="stat stall"><div class="n">${stallN}</div><div class="l">stalled</div></div>
        <div class="stat lock"><div class="n">${lockedN}</div><div class="l">locked</div></div>
        <button class="btn btn-all" onclick="restartAll(this)">↻ restart all</button>
        <button class="btn btn-stopall" onclick="stopAll(this)">■ stop all</button>`;

      const t = new Date(data.timestamp * 1000);
      document.getElementById('foot').textContent = 'updated ' + t.toLocaleTimeString();
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
